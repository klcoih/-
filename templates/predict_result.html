<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预测结果 - 智慧大棚</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f4f9f4;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar-brand i {
            margin-right: 8px;
        }
        .page-header {
            margin-bottom: 1.8rem;
        }
        .page-header h2 {
            font-weight: 600;
            color: #1e3a1e;
            border-left: 6px solid #2e7d32;
            padding-left: 1rem;
        }
        .info-alert {
            border: none;
            border-radius: 20px;
            background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
            color: #1e3a1e;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.1);
            padding: 1.2rem 1.5rem;
        }
        .info-alert i {
            font-size: 1.4rem;
            vertical-align: middle;
        }
        .result-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 15px 30px rgba(0, 30, 0, 0.08);
            background: #ffffff;
            overflow: hidden;
        }
        .result-card .card-body {
            padding: 1.5rem;
        }
        .chart-container {
            background: #fafdfa;
            border-radius: 20px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(46, 125, 50, 0.1);
        }
        .chart-container img {
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            width: 100%;
            height: auto;
        }
        .btn-download {
            background: #2e7d32;
            color: white;
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            font-weight: 500;
            border: none;
            box-shadow: 0 6px 12px rgba(46, 125, 50, 0.2);
            transition: all 0.2s;
        }
        .btn-download:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(46, 125, 50, 0.3);
            color: white;
        }
        .btn-outline-secondary {
            border-radius: 40px;
            padding: 0.6rem 1.8rem;
            font-weight: 500;
            border: 1px solid #ced4da;
            background: white;
        }
        .btn-outline-secondary:hover {
            background: #f8f9fa;
            border-color: #2e7d32;
            color: #2e7d32;
        }
        .model-badge {
            background: #2e7d32;
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .stat-item {
            display: inline-flex;
            align-items: center;
            background: #f1f8e9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            margin-right: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .footer-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        @media (max-width: 576px) {
            .footer-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">
            <i class="bi bi-flower1"></i> 智慧大棚
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}"><i class="bi bi-house"></i> 首页</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('predict_center') }}"><i class="bi bi-graph-up"></i> 预测中心</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('messages') }}"><i class="bi bi-chat-dots"></i> 消息</a></li>
                <li class="nav-item"><a class="nav-link" href="{{ url_for('profile') }}"><i class="bi bi-person-circle"></i> 个人中心</a></li>
                <!-- 管理菜单按需显示，此处保持简洁，可根据角色扩展 -->
                <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right"></i> 退出</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="page-header">
        <h2><i class="bi bi-bar-chart-steps me-2"></i>预测结果报告</h2>
    </div>

    <!-- 统计信息卡片 -->
    <div class="info-alert d-flex flex-wrap align-items-center">
        <div class="me-3 mb-2 mb-md-0">
            <i class="bi bi-calendar-range me-2"></i>
            <span>数据跨度 <strong>{{ span_days }} 天</strong></span>
        </div>
        <div class="me-3 mb-2 mb-md-0">
            <i class="bi bi-cpu me-2"></i>
            <span>模型 <span class="model-badge ms-1">{{ model_name }}</span></span>
        </div>
        <div class="me-3 mb-2 mb-md-0">
            <i class="bi bi-arrow-right-circle me-2"></i>
            <span>预测未来 <strong>{{ pred_days }} 天</strong></span>
        </div>
        <div class="ms-auto">
            <span class="stat-item">
                <i class="bi bi-bullseye me-1"></i> {{ target }}
            </span>
        </div>
    </div>

    <!-- 预测图表卡片 -->
    <div class="result-card">
        <div class="card-body">
            <div class="chart-container">
                <img src="{{ img_url }}" alt="预测曲线图" class="img-fluid">
            </div>

            <div class="footer-actions">
                <a href="{{ csv_url }}" class="btn btn-download">
                    <i class="bi bi-download me-2"></i>下载预测结果 CSV
                </a>
                <a href="{{ url_for('predict_center') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>返回预测中心
                </a>
                <a href="{{ url_for('profile') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-clock-history me-2"></i>我的历史记录
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
