<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧大棚预测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            max-width: 420px;
            margin: 0 auto;
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 40px rgba(0, 40, 0, 0.15);
            transition: transform 0.2s ease;
        }
        .login-card:hover {
            transform: translateY(-5px);
        }
        .card-body {
            padding: 2.2rem;
        }
        .input-group-text {
            border: 1px solid #c5e1a5;
            border-right: none;
            border-radius: 12px 0 0 12px;
            background-color: #f1f8e9;
        }
        .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0.75rem 1rem;
            background-color: #f1f8e9;
            border: 1px solid #c5e1a5;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #2e7d32;
            background-color: #ffffff;
        }
        .password-toggle {
            cursor: pointer;
            background-color: #f1f8e9;
            border: 1px solid #c5e1a5;
            border-left: none;
            border-radius: 0 12px 12px 0;
            padding: 0 12px;
            display: flex;
            align-items: center;
        }
        .btn-login {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border: none;
            border-radius: 40px;
            padding: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(46, 125, 50, 0.25);
            transition: all 0.2s;
        }
        .btn-login:hover {
            background: linear-gradient(145deg, #1b5e20, #145214);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .btn-login:disabled {
            opacity: 0.7;
            transform: none;
        }
        .brand-icon {
            font-size: 2.8rem;
            color: #2e7d32;
        }
        .alert {
            border-radius: 40px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="bi bi-flower1 brand-icon"></i>
                <h3 class="fw-bold text-success mt-2">🌱 登录系统</h3>
                <p class="text-muted small">智慧大棚 · 温湿度预测</p>
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ messages[0] }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endif %}
            {% endwith %}

            <form method="post" id="loginForm">
                <!-- 用户名 -->
                <div class="mb-3">
                    <label class="form-label fw-semibold small text-secondary">用户名</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" id="username"
                               placeholder="请输入用户名" required autofocus>
                    </div>
                </div>

                <!-- 密码 -->
                <div class="mb-4">
                    <label class="form-label fw-semibold small text-secondary">密码</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" id="password"
                               placeholder="请输入密码" required>
                        <span class="password-toggle" id="togglePassword" tabindex="0">
                            <i class="bi bi-eye-slash" id="toggleIcon"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-login text-white w-100" id="submitBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="btnSpinner" role="status"></span>
                    登录
                </button>

                <div class="text-center mt-4">
                    <span class="text-muted small">还没有账号？</span>
                    <a href="{{ url_for('register') }}" class="text-success fw-semibold text-decoration-none">
                        立即注册 <i class="bi bi-arrow-right-circle"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function() {
        'use strict';

        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');

        // 密码可见切换
        const toggleBtn = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');

        if (toggleBtn && passwordInput && toggleIcon) {
            toggleBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                toggleIcon.classList.toggle('bi-eye');
                toggleIcon.classList.toggle('bi-eye-slash');
            });

            toggleBtn.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });
        }

        // 提交时显示加载状态，防止重复提交
        form.addEventListener('submit', function() {
            if (form.checkValidity()) {
                submitBtn.disabled = true;
                btnSpinner.classList.remove('d-none');
            }
        });
    })();
</script>
</body>
</html>
