<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧大棚 · 温湿度预测系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
        }
        .navbar-custom {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 0.5rem 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 40, 0, 0.08);
            margin-top: 20px;
        }
        .navbar-brand {
            font-weight: 700;
            color: #2e7d32 !important;
            font-size: 1.5rem;
        }
        .navbar-brand i {
            margin-right: 8px;
        }
        .btn-outline-success-custom {
            border: 1.5px solid #2e7d32;
            color: #2e7d32;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-outline-success-custom:hover {
            background: #2e7d32;
            color: white;
        }
        .btn-success-custom {
            background: #2e7d32;
            border: none;
            color: white;
            border-radius: 40px;
            padding: 0.5rem 1.8rem;
            font-weight: 600;
            box-shadow: 0 6px 12px rgba(46, 125, 50, 0.25);
            transition: all 0.2s;
        }
        .btn-success-custom:hover {
            background: #1b5e20;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(46, 125, 50, 0.3);
            color: white;
        }
        .hero {
            background: linear-gradient(145deg, #1e3a1e, #2e7d32);
            color: white;
            border-radius: 40px;
            padding: 3.5rem 2rem;
            margin: 2rem 0 3rem;
            box-shadow: 0 25px 35px -10px rgba(0, 40, 0, 0.25);
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: "🌿";
            font-size: 15rem;
            opacity: 0.05;
            position: absolute;
            right: -30px;
            bottom: -40px;
            transform: rotate(15deg);
            pointer-events: none;
        }
        .hero h1 {
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .hero .lead {
            opacity: 0.9;
            max-width: 700px;
            margin: 1rem auto;
        }
        .hero .btn-light {
            border-radius: 50px;
            padding: 0.8rem 2.5rem;
            font-weight: 600;
            color: #1e3a1e;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .hero .btn-light:hover {
            background: #f0f7f0;
            transform: scale(1.03);
        }
        .feature-card {
            border: none;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            box-shadow: 0 15px 30px rgba(0, 30, 0, 0.05);
            transition: all 0.3s ease;
            height: 100%;
        }
        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px rgba(0, 60, 0, 0.1);
            background: white;
        }
        .feature-icon {
            font-size: 3.5rem;
            color: #2e7d32;
            margin-bottom: 1.2rem;
        }
        .card-title {
            font-weight: 700;
            color: #1e3a1e;
        }
        .footer-custom {
            color: #4a5a4a;
            border-top: 1px solid rgba(46, 125, 50, 0.2);
            margin-top: 3rem;
            padding-top: 2rem;
            text-align: center;
        }
        .footer-custom a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .hero {
                padding: 2.5rem 1rem;
            }
            .hero h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-flower1"></i> 智慧大棚
            </a>
            <div class="ms-auto">
                <a href="{{ url_for('login') }}" class="btn btn-outline-success-custom me-2 me-sm-3">
                    <i class="bi bi-box-arrow-in-right me-1"></i>登录
                </a>
                <a href="{{ url_for('register') }}" class="btn btn-success-custom">
                    <i class="bi bi-person-plus me-1"></i>注册
                </a>
            </div>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <div class="hero text-center">
        <i class="bi bi-cloud-sun-fill fs-1 mb-2 d-block"></i>
        <h1 class="display-3 fw-bold">智慧大棚温湿度预测</h1>
        <p class="lead fs-5">
            <i class="bi bi-database me-1"></i> 多传感器数据融合
            <span class="mx-3">·</span>
            <i class="bi bi-cpu me-1"></i> AI模型驱动
            <span class="mx-3">·</span>
            <i class="bi bi-calendar3-week me-1"></i> 未来趋势洞察
        </p>
        <p class="mt-3 mb-4">精准预测未来7~30天温湿度，为科学种植提供决策支持</p>
        <a href="{{ url_for('register') }}" class="btn btn-light btn-lg">
            <i class="bi bi-rocket-takeoff me-2"></i>立即体验
        </a>
    </div>

    <!-- 功能介绍卡片 -->
    <div class="row g-4">
        <div class="col-md-4">
            <div class="card feature-card p-4 text-center">
                <div class="feature-icon">
                    <i class="bi bi-file-earmark-spreadsheet"></i>
                </div>
                <h5 class="card-title">📋 数据自动清洗</h5>
                <p class="card-text text-secondary">上传原始txt文件，自动识别编码、清洗异常数据（连续零值、超范围值），转换为标准CSV格式。</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card feature-card p-4 text-center">
                <div class="feature-icon">
                    <i class="bi bi-magic"></i>
                </div>
                <h5 class="card-title">🤖 智能模型推荐</h5>
                <p class="card-text text-secondary">根据数据年限自动选择Prophet（年周期）或线性回归模型，也可手动指定，预测未来7~30天温湿度。</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card feature-card p-4 text-center">
                <div class="feature-icon">
                    <i class="bi bi-chat-dots"></i>
                </div>
                <h5 class="card-title">💬 用户交流社区</h5>
                <p class="card-text text-secondary">内置站内消息系统，用户之间可互发信息，分享种植经验和预测结果，共同进步。</p>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer class="footer-custom">
        <p class="mb-1">
            <i class="bi bi-c-circle"></i> 2025 智慧大棚预测系统
            <span class="mx-2">|</span>
            <i class="bi bi-tree"></i> 数据驱动农业未来
        </p>
        <p class="small text-muted">
            <a href="#"><i class="bi bi-shield-check"></i> 隐私条款</a> ·
            <a href="#"><i class="bi bi-envelope"></i> 联系我们</a>
        </p>
    </footer>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
